<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Extractor de Facturas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  .key-input { width: 100%; padding: 9px 12px; font-size: 13px; border: 0.5px solid #ccc; border-radius: 8px; font-family: monospace; background: #fafafa; color: #1a1a1a; outline: none; }
  .key-input:focus { border-color: #378ADD; }
  .hint { font-size: 11px; color: #999; margin-top: 5px; }
  .hint a { color: #378ADD; }
  .zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: background 0.15s, border-color 0.15s; background: #fafafa; }
  .zone.drag { background: #EBF4FD; border-color: #378ADD; }
  .zone-icon { font-size: 36px; margin-bottom: 8px; color: #aaa; }
  .zone p { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .zone small { font-size: 12px; color: #888; }
  .btn { cursor: pointer; background: transparent; border: 0.5px solid #bbb; border-radius: 8px; padding: 8px 18px; font-size: 14px; color: #1a1a1a; transition: background 0.1s; font-family: inherit; }
  .btn:hover { background: #f0eeea; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:hover { background: #333; }
  .btn-dl { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .btn-dl:hover { background: #0F6E56; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: #f0eeea; border: 0.5px solid #ddd; border-radius: 8px; padding: 5px 10px; font-size: 13px; color: #444; }
  .rm { cursor: pointer; color: #aaa; font-size: 16px; line-height: 1; }
  .rm:hover { color: #333; }
  .prog-wrap { margin-top: 12px; display: none; }
  .prog-text { font-size: 13px; color: #555; margin-bottom: 6px; }
  .prog-bar { height: 4px; background: #e5e5e5; border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: #378ADD; transition: width 0.3s; border-radius: 99px; }
  .actions { display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .table-wrap { margin-top: 20px; border: 0.5px solid #ddd; border-radius: 12px; overflow: hidden; display: none; }
  .row { display: grid; grid-template-columns: 1.8fr 1fr 2fr 1fr 1fr; }
  .row > div { padding: 9px 11px; font-size: 13px; border-bottom: 0.5px solid #eee; word-break: break-word; }
  .hdr > div { font-size: 12px; font-weight: 500; color: #666; background: #fafafa; border-bottom: 0.5px solid #ddd; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .ok { background: #EAF3DE; color: #3B6D11; }
  .proc { background: #E6F1FB; color: #185FA5; }
  .err { background: #FCEBEB; color: #A32D2D; }
  @media (max-width: 520px) {
    .row { grid-template-columns: 1.5fr 0.9fr 1.8fr 0.9fr 0.8fr; }
    .row > div { font-size: 11px; padding: 7px 7px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Extractor de Facturas</h1>
  <p class="sub">Sube fotos o PDFs de facturas y descarga el Excel listo para el contador.</p>

  <div class="card">
    <label>API Key de Anthropic</label>
    <input class="key-input" id="apiKey" type="password" placeholder="sk-ant-..." />
    <p class="hint">Solo se usa en tu navegador, nunca se envía a otro servidor. <a href="https://console.anthropic.com" target="_blank">Obtener key →</a></p>
  </div>

  <div class="card">
    <div class="zone" id="dropZone">
      <div class="zone-icon">☁</div>
      <p>Arrastra fotos o PDFs aquí</p>
      <small>JPG, PNG, PDF — varias a la vez</small>
      <br /><br />
      <button class="btn" onclick="document.getElementById('fileInput').click()">Seleccionar archivos</button>
      <input type="file" id="fileInput" multiple accept="image/*,.pdf" style="display:none" />
    </div>
    <div class="chips" id="fileList"></div>
  </div>

  <div class="prog-wrap" id="progress">
    <p class="prog-text" id="progressText"></p>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="processBtn" onclick="processAll()" disabled>Procesar facturas</button>
    <button class="btn btn-dl" id="downloadBtn" onclick="downloadExcel()" style="display:none" disabled>⬇ Descargar Excel</button>
    <span id="statusMsg" style="font-size:12px;color:#888;"></span>
  </div>

  <div class="table-wrap" id="tableWrap">
    <div class="row hdr">
      <div>Archivo</div><div>Fecha</div><div>Proveedor</div><div>Monto total</div><div>IVA</div>
    </div>
    <div id="tableBody"></div>
  </div>
</div>

<script>
let files = [];
let results = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => addFiles(fileInput.files));
document.getElementById('apiKey').addEventListener('input', updateBtn);

function addFiles(newFiles) {
  for (const f of newFiles) {
    if (!files.find(x => x.name === f.name)) files.push(f);
  }
  renderChips();
  updateBtn();
}

function removeFile(name) {
  files = files.filter(f => f.name !== name);
  renderChips();
  updateBtn();
}

function renderChips() {
  const el = document.getElementById('fileList');
  el.innerHTML = files.map(f => `
    <div class="chip">
      <span>${f.name.length > 24 ? f.name.slice(0,22)+'…' : f.name}</span>
      <span class="rm" onclick="removeFile('${CSS.escape(f.name)}')">×</span>
    </div>`).join('');
}

function updateBtn() {
  const key = document.getElementById('apiKey').value.trim();
  document.getElementById('processBtn').disabled = files.length === 0 || !key;
}

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function processFile(file, key) {
  const b64 = await fileToBase64(file);
  const isPdf = file.type === 'application/pdf';
  const mediaType = isPdf ? 'application/pdf' : file.type;
  const contentItem = isPdf
    ? { type: 'document', source: { type: 'base64', media_type: mediaType, data: b64 } }
    : { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } };

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-ipc': 'true' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 512,
      messages: [{
        role: 'user',
        content: [
          contentItem,
          { type: 'text', text: 'Extrae de esta factura: fecha, nombre del proveedor o empresa, monto total, y monto de IVA. Responde SOLO con JSON sin texto adicional ni backticks, con exactamente estas claves: fecha, proveedor, monto_total, iva. Si algún dato no aparece escribe null.' }
        ]
      }]
    })
  });

  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error?.message || 'Error API');
  const text = data.content[0].text.trim().replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

async function processAll() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key || files.length === 0) return;

  results = [];
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('downloadBtn').style.display = 'none';
  document.getElementById('processBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    document.getElementById('progressText').textContent = `Procesando ${i + 1} de ${files.length}: ${f.name}`;
    document.getElementById('progFill').style.width = ((i / files.length) * 100) + '%';
    addRow(f.name, null, 'proc');
    try {
      const data = await processFile(f, key);
      data._file = f.name;
      results.push(data);
      updateRow(f.name, data, 'ok');
    } catch(e) {
      results.push({ _file: f.name, fecha: null, proveedor: null, monto_total: null, iva: null, _error: e.message });
      updateRow(f.name, null, 'err');
    }
  }

  document.getElementById('progFill').style.width = '100%';
  const ok = results.filter(r => !r._error).length;
  document.getElementById('progressText').textContent = `Listo. ${ok} de ${files.length} procesadas correctamente.`;
  document.getElementById('tableWrap').style.display = 'block';
  document.getElementById('downloadBtn').style.display = 'inline-block';
  document.getElementById('downloadBtn').disabled = false;
  document.getElementById('processBtn').disabled = false;
}

function rowId(name) { return 'row_' + name.replace(/[^a-z0-9]/gi, '_'); }

function addRow(name, data, status) {
  const tb = document.getElementById('tableBody');
  const div = document.createElement('div');
  div.className = 'row';
  div.id = rowId(name);
  div.innerHTML = rowHtml(name, data, status);
  tb.appendChild(div);
}

function updateRow(name, data, status) {
  const div = document.getElementById(rowId(name));
  if (div) div.innerHTML = rowHtml(name, data, status);
}

function rowHtml(name, data, status) {
  const short = name.length > 20 ? name.slice(0, 18) + '…' : name;
  if (status === 'proc') return `<div><span class="badge proc">...</span> <span style="font-size:11px;color:#aaa">${short}</span></div><div>—</div><div>—</div><div>—</div><div>—</div>`;
  if (status === 'err')  return `<div><span class="badge err">Error</span> <span style="font-size:11px;color:#aaa">${short}</span></div><div>—</div><div>—</div><div>—</div><div>—</div>`;
  return `
    <div><span class="badge ok">OK</span> <span style="font-size:11px;color:#aaa">${short}</span></div>
    <div>${data.fecha || '—'}</div>
    <div>${data.proveedor || '—'}</div>
    <div>${data.monto_total ?? '—'}</div>
    <div>${data.iva ?? '—'}</div>`;
}

function downloadExcel() {
  if (!results.length) return;
  const rows = [['Archivo', 'Fecha', 'Proveedor / Empresa', 'Monto Total', 'IVA']];
  for (const r of results) rows.push([r._file, r.fecha || '', r.proveedor || '', r.monto_total ?? '', r.iva ?? '']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:32},{wch:14},{wch:32},{wch:14},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Facturas');
  XLSX.writeFile(wb, 'facturas.xlsx');
}
</script>
</body>
</html>
